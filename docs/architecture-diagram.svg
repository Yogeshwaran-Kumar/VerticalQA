<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 480">
  <!-- Ingestion Layer -->
  <rect x="30" y="30" width="220" height="420" fill="#FFFACD" stroke="#000" stroke-width="2"/>
  <text x="140" y="60" text-anchor="middle" font-size="18" font-weight="bold">Ingestion Layer</text>
  
  <!-- Client Audio Box -->
  <rect x="46" y="140" width="128" height="120" fill="#FFF" stroke="#000" stroke-width="2"/>
  <text x="110" y="210" text-anchor="middle" font-size="16" font-weight="bold">Client Audio</text>
  
  <!-- WebSocket Serial Arrow -->
  <line x1="174" y1="200" x2="280" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="220" y="190" text-anchor="middle" font-size="12">WebSocket</text>
  <text x="220" y="220" text-anchor="middle" font-size="12">Serial</text>
  
  <!-- Backend Orchestration Layer -->
  <rect x="280" y="30" width="480" height="420" fill="#F0E68C" stroke="#000" stroke-width="2"/>
  <text x="520" y="60" text-anchor="middle" font-size="18" font-weight="bold">Backend Orchestration Layer</text>
  
  <!-- ASR Box -->
  <rect x="312" y="90" width="96" height="80" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="360" y="135" text-anchor="middle" font-size="16" font-weight="bold">ASR</text>
  
  <!-- ESR Box -->
  <rect x="312" y="210" width="96" height="80" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="360" y="255" text-anchor="middle" font-size="16" font-weight="bold">ESR</text>
  
  <!-- Context Fuser Box -->
  <rect x="470" y="160" width="120" height="80" fill="#FAFAD2" stroke="#000" stroke-width="2" rx="5"/>
  <text x="530" y="195" text-anchor="middle" font-size="14" font-weight="bold">Context Fuser</text>
  
  <!-- LLM Box -->
  <rect x="578" y="140" width="128" height="120" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="642" y="210" text-anchor="middle" font-size="16" font-weight="bold">LLM</text>
  
  <!-- Arrows from ASR/ESR to Context Fuser -->
  <line x1="408" y1="130" x2="470" y2="190" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="408" y1="250" x2="470" y2="210" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow from Context Fuser to LLM -->
  <line x1="590" y1="200" x2="578" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision Diamond -->
  <polygon points="360,340 410,370 360,400 310,370" fill="#FFF" stroke="#000" stroke-width="2"/>
  <text x="360" y="370" text-anchor="middle" font-size="11">Is Risk or</text>
  <text x="360" y="385" text-anchor="middle" font-size="11">Toxicity true?</text>
  
  <!-- Arrow from ESR to Diamond -->
  <line x1="360" y1="290" x2="360" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- TTS Box -->
  <rect x="578" y="310" width="128" height="120" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="642" y="380" text-anchor="middle" font-size="16" font-weight="bold">TTS</text>
  
  <!-- Arrow from Diamond to TTS -->
  <line x1="410" y1="370" x2="578" y2="370" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="490" y="360" text-anchor="middle" font-size="14" font-weight="bold">Yes</text>
  
  <!-- JSON arrows from LLM -->
  <line x1="706" y1="200" x2="790" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="740" y="190" text-anchor="middle" font-size="12">JSON</text>
  
  <!-- JSON arrow from LLM down -->
  <line x1="642" y1="260" x2="642" y2="290" stroke="#000" stroke-width="2"/>
  <text x="660" y="280" text-anchor="middle" font-size="12">JSON</text>
  
  <!-- Action Layer -->
  <rect x="790" y="30" width="204" height="420" fill="#E6E6FA" stroke="#000" stroke-width="2"/>
  <text x="892" y="60" text-anchor="middle" font-size="18" font-weight="bold">Action Layer</text>
  
  <!-- Live Monitoring Dashboard Box -->
  <rect x="830" y="140" width="128" height="120" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="894" y="190" text-anchor="middle" font-size="14" font-weight="bold">Live</text>
  <text x="894" y="210" text-anchor="middle" font-size="14" font-weight="bold">Monitoring</text>
  <text x="894" y="230" text-anchor="middle" font-size="14" font-weight="bold">Dashboard</text>
  
  <!-- Human Agent Box -->
  <rect x="830" y="310" width="128" height="120" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="894" y="365" text-anchor="middle" font-size="14" font-weight="bold">Human</text>
  <text x="894" y="385" text-anchor="middle" font-size="14" font-weight="bold">Agent</text>
  
  <!-- Arrow from TTS to Human Agent -->
  <line x1="706" y1="370" x2="830" y2="370" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="760" y="360" text-anchor="middle" font-size="11">Agent_suggestion</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#000"/>
    </marker>
  </defs>
</svg>
